04eg：封装classname
<body>
  <div class=" demo  "> </div>
  <div class=" demo"> </div>
  <div class="demo"> </div>

<script>
Document.prototype.getClassName = function(className){
      var allEle = document.getElementsByTagName('*'),
      length=allEle.length,
      retArr = [],
      reg=/^\s+|\s+$/g;
      for(var i = 0 ;i < length ;i++){
        if(allEle[i].className.replace(reg,"")== className){
          retArr.push(allEle[i]);
        }
      }
      return retArr;
}

3，HTTP协议是TCP/IP协议族中的子集。
应用层，传输层，网略层，数据链路层
应用层：向用户提供服务时的活动
传输层：对应上层应用层，提供处于网络连接中的两台计算机之间的数据传输。
网络层：用来处理网络上流动的数据包（数据包是最小的网络传输单位）
链路层：用来处理连接网络的硬件部分
         客户端             服务器端
应用层   HTTP                HTTP
传输层   TCP                 TCP
网络层   IP                  IP
链路层   网络                网络


通讯流传输
IP协议：（负责传输）
位于网络层的，IP和IP地址。
IP地址：知名节点被分配的地址
TCP协议：确保可靠性（三次握手）
三次交互：
1.先发送一个带有SYN标志的数据包给对方。
2.接收端收到后，会回传一个带有SYN/ACK标志的数据包，来表示传达确认信息。
3.最后是发送端再回传一个带有ACK标志的数据包，代表握手结束.
DNS：负责域名解析的服务，和HTTP相同，是位于应用层的协议，提供域名到IP地址的解析服务
